<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- Red neon glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Gradient for background hex -->
    <linearGradient id="hexGrad" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0a0508"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="100" y1="80" x2="300" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff4040"/>
      <stop offset="100%" stop-color="#ff1a1a"/>
    </linearGradient>
    <!-- Subtle line gradient -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff3030" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ff5050" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff2020" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="#080409" stroke="url(#lineGrad)" stroke-width="1.5"/>

  <!-- Outer hexagonal ring -->
  <polygon points="200,30 347,115 347,285 200,370 53,285 53,115"
    fill="none" stroke="url(#lineGrad)" stroke-width="1" opacity="0.6"/>

  <!-- Inner hexagonal frame -->
  <polygon points="200,60 320,130 320,270 200,340 80,270 80,130"
    fill="url(#hexGrad)" fill-opacity="0.5" stroke="#ff2a2a" stroke-width="1.5" stroke-opacity="0.25"/>

  <!-- Circuit decoration lines -->
  <g stroke="#ff2a2a" stroke-opacity="0.15" stroke-width="1">
    <!-- Top left -->
    <line x1="80" y1="130" x2="53" y2="115"/>
    <line x1="200" y1="60" x2="200" y2="30"/>
    <line x1="320" y1="130" x2="347" y2="115"/>
    <!-- Bottom -->
    <line x1="80" y1="270" x2="53" y2="285"/>
    <line x1="200" y1="340" x2="200" y2="370"/>
    <line x1="320" y1="270" x2="347" y2="285"/>
  </g>

  <!-- Small circuit dots at hex vertices -->
  <g fill="#ff2a2a" filter="url(#glow)">
    <circle cx="200" cy="60" r="3" opacity="0.7"/>
    <circle cx="320" cy="130" r="3" opacity="0.5"/>
    <circle cx="320" cy="270" r="3" opacity="0.5"/>
    <circle cx="200" cy="340" r="3" opacity="0.7"/>
    <circle cx="80" cy="270" r="3" opacity="0.5"/>
    <circle cx="80" cy="130" r="3" opacity="0.5"/>
  </g>

  <!-- Horizontal scan line accents -->
  <rect x="100" y="108" width="200" height="1" fill="#ff2a2a" opacity="0.12" rx="0.5"/>
  <rect x="120" y="290" width="160" height="1" fill="#ff2a2a" opacity="0.10" rx="0.5"/>

  <!-- ===== LETTER G ===== -->
  <g filter="url(#glowStrong)">
    <path d="
      M 108,155
      L 108,155
      L 185,155
      L 185,170
      L 124,170
      L 124,230
      L 175,230
      L 175,205
      L 155,205
      L 155,190
      L 190,190
      L 190,245
      L 108,245
      Z
    " fill="url(#accentGrad)" opacity="0.95"/>
  </g>

  <!-- ===== LETTER P ===== -->
  <g filter="url(#glowStrong)">
    <path d="
      M 210,155
      L 290,155
      L 290,205
      L 226,205
      L 226,245
      L 210,245
      Z
      M 226,170
      L 226,190
      L 274,190
      L 274,170
      Z
    " fill="url(#accentGrad)" opacity="0.95" fill-rule="evenodd"/>
  </g>

  <!-- Thin accent lines under letters -->
  <rect x="108" y="252" width="82" height="2" fill="#ff2a2a" opacity="0.5" rx="1" filter="url(#glow)"/>
  <rect x="210" y="252" width="80" height="2" fill="#ff2a2a" opacity="0.5" rx="1" filter="url(#glow)"/>

  <!-- Small decorative dashes -->
  <rect x="108" y="148" width="25" height="1" fill="#ff2a2a" opacity="0.3"/>
  <rect x="267" y="148" width="25" height="1" fill="#ff2a2a" opacity="0.3"/>

  <!-- Corner brackets for tech feel -->
  <g stroke="#ff2a2a" stroke-width="1.5" stroke-opacity="0.35" fill="none">
    <!-- Top-left bracket -->
    <polyline points="95,145 95,135 105,135"/>
    <!-- Top-right bracket -->
    <polyline points="295,135 305,135 305,145"/>
    <!-- Bottom-left bracket -->
    <polyline points="95,255 95,265 105,265"/>
    <!-- Bottom-right bracket -->
    <polyline points="295,265 305,265 305,255"/>
  </g>

  <!-- Subtle version text -->
  <text x="200" y="310" text-anchor="middle" fill="#ff2a2a" fill-opacity="0.35"
    font-family="monospace" font-size="11" letter-spacing="6">OPERATOR</text>

</svg>